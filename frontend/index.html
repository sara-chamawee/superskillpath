<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SuperPath - Personalized Learning</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--primary:#2d3436;--accent:#e17055;--accent-light:#ffeaa7;--green:#00b894;--purple:#e74c3c;--bg:#fafafa;--card:white;--text:#2d3436;--text2:#636e72;--text3:#b2bec3;--border:#dfe6e9;--radius:16px;--chat-ai:#f0f0f5;--chat-user:#e74c3c}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'IBM Plex Sans Thai','Segoe UI',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;font-size:14px;line-height:1.6}

/* NAV */
.nav{background:white;height:56px;display:flex;align-items:center;padding:0 24px;border-bottom:1px solid var(--border);justify-content:space-between}
.nav .logo{font-size:1.2em;font-weight:700;color:var(--purple);display:flex;align-items:center;gap:8px}
.nav .logo span{color:var(--accent)}
.nav-right{display:flex;align-items:center;gap:16px}
.nav-btn{padding:6px 16px;border-radius:8px;font-size:.8em;border:1px solid var(--border);background:white;cursor:pointer;color:var(--text2);font-weight:500}
.nav-btn.active{background:var(--primary);color:white;border-color:var(--primary)}
.avatar{width:32px;height:32px;border-radius:50%;background:var(--purple);color:white;display:flex;align-items:center;justify-content:center;font-size:.75em;font-weight:600}

.main{display:flex;height:calc(100vh - 52px)}

/* CATALOG */
#cat{width:100%;padding:32px 40px;overflow-y:auto}
.cat-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px}
.cat-top h1{font-size:1.4em;font-weight:700;color:var(--primary);margin-bottom:4px}
.cat-top p{font-size:.85em;color:var(--text3)}
.search{padding:10px 16px;border:1.5px solid var(--border);border-radius:10px;font-size:.85em;width:300px;outline:none;font-family:inherit;transition:border .2s}
.search:focus{border-color:var(--purple)}
.cat-info{font-size:.78em;color:var(--text3);margin-bottom:16px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.card{background:var(--card);border-radius:var(--radius);padding:20px;cursor:pointer;border:1.5px solid transparent;transition:all .2s}
.card:hover{border-color:var(--purple);box-shadow:0 4px 16px rgba(231,76,60,.1)}
.card .tag{font-size:.68em;color:var(--purple);background:#fde8e8;padding:2px 10px;border-radius:8px;display:inline-block;margin-bottom:8px;font-weight:500}
.card h3{font-size:.9em;font-weight:600;color:var(--primary);margin-bottom:6px}
.card .desc{font-size:.78em;color:var(--text2);line-height:1.5;margin-bottom:10px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card .meta{font-size:.72em;color:var(--text3);display:flex;gap:12px}
.more-btn{display:block;margin:24px auto;padding:10px 32px;background:white;border:1.5px solid var(--border);border-radius:10px;cursor:pointer;font-size:.85em;color:var(--text2);font-family:inherit}

/* LEARN VIEW */
#learn{display:none;width:100%}

/* SIDEBAR */
.sb{width:280px;min-width:280px;background:var(--primary);overflow-y:auto;display:flex;flex-direction:column}
.sb-top{padding:20px;border-bottom:1px solid rgba(255,255,255,.08)}
.sb-top .label{font-size:.65em;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:1px;font-weight:600}
.sb-top h2{font-size:.95em;color:white;margin:6px 0 12px;font-weight:600}
.sb-bar{background:rgba(255,255,255,.12);border-radius:4px;height:5px;margin-bottom:4px}
.sb-bar-fill{background:var(--green);height:100%;border-radius:4px;transition:width .4s}
.sb-pct{font-size:.7em;color:var(--green);font-weight:600}
.sb-btn{width:100%;padding:10px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);border-radius:8px;cursor:pointer;font-size:.8em;color:rgba(255,255,255,.8);font-weight:500;margin-top:12px;font-family:inherit;text-align:left;display:flex;align-items:center;gap:8px}
.sb-btn:hover{background:rgba(255,255,255,.14)}
.sb-back{background:none;border:none;cursor:pointer;font-size:.75em;color:rgba(255,255,255,.45);margin-top:8px;font-family:inherit;text-align:left;padding:0}
.sb-back:hover{color:rgba(255,255,255,.7)}
.sb-sec{font-size:.6em;color:rgba(255,255,255,.3);font-weight:700;text-transform:uppercase;letter-spacing:1px;padding:16px 20px 6px}
.si{padding:10px 20px;cursor:pointer;display:flex;gap:10px;align-items:flex-start;border-left:3px solid transparent;transition:all .15s}
.si:hover{background:rgba(255,255,255,.04)}.si.active{background:rgba(255,255,255,.08);border-left-color:var(--green)}
.si .dot{width:8px;height:8px;border-radius:50%;margin-top:5px;flex-shrink:0}
.si .dot.c{background:#5dade2}.si .dot.t{background:#f5b041}
.si .inf{flex:1}.si .tp{font-size:.6em;color:rgba(255,255,255,.35);font-weight:500}.si .nm{font-size:.78em;color:rgba(255,255,255,.85);line-height:1.4}.si .du{font-size:.65em;color:rgba(255,255,255,.3);margin-top:2px}

/* CONTENT */
.ct{flex:1;overflow-y:auto;background:var(--bg)}
.ct-head{background:white;padding:28px 36px;border-bottom:1px solid var(--border)}
.ct-head .bc{font-size:.72em;color:var(--text3);margin-bottom:6px;display:flex;align-items:center;gap:4px}
.ct-head h2{font-size:1.15em;font-weight:700;color:var(--primary);margin-bottom:10px}
.ct-head .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.pill{padding:4px 12px;border-radius:8px;font-size:.72em;font-weight:500}
.pill-green{background:#e8f8f0;color:var(--green)}
.pill-purple{background:#fde8e8;color:var(--purple)}
.btn{padding:8px 18px;border-radius:8px;font-size:.8em;font-weight:600;border:none;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--accent);color:white}.btn-primary:hover{background:#c0392b}
.btn-blue{background:var(--purple);color:white}.btn-blue:hover{background:#c0392b}
.btn-green{background:var(--green);color:white}
.btn-outline{background:white;color:var(--text2);border:1.5px solid var(--border)}.btn-outline:hover{background:var(--bg)}
.ct-body{padding:28px 36px}

/* CHECKLIST CARD */
.cl-card{background:white;border-radius:var(--radius);padding:20px 24px;margin-bottom:16px;border:1px solid var(--border)}
.cl-card h3{font-size:.88em;font-weight:600;color:var(--primary);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.cl-item{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid #f5f6f8}
.cl-item:last-child{border-bottom:none}
.cl-check{width:18px;height:18px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.55em;margin-top:2px}
.cl-check.done{background:var(--green);border-color:var(--green);color:white}
.cl-text{font-size:.8em;color:var(--text2);line-height:1.5}

/* COURSE CARD */
.course-card{background:white;border-radius:var(--radius);padding:16px;margin-bottom:12px;display:flex;gap:16px;align-items:center;border:1px solid var(--border);cursor:pointer;transition:all .15s}
.course-card:hover{border-color:var(--purple);box-shadow:0 2px 8px rgba(231,76,60,.08)}
.course-thumb{width:110px;height:65px;border-radius:8px;background:linear-gradient(135deg,var(--purple),#ff6b6b);display:flex;align-items:center;justify-content:center;color:white;font-size:.6em;text-align:center;flex-shrink:0;padding:6px;font-weight:600;line-height:1.3}
.course-card h4{font-size:.85em;font-weight:600;color:var(--primary);margin-bottom:3px}
.course-card .sub{font-size:.75em;color:var(--text3)}

/* CHAT */
.cp{width:380px;min-width:380px;background:white;border-left:1px solid var(--border);display:flex;flex-direction:column;transition:width .3s,min-width .3s}
.cp.expanded{position:absolute;right:0;top:52px;bottom:0;width:calc(100% - 280px);min-width:calc(100% - 280px);z-index:50}
.cp-top{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;background:white}
.cp-top h3{font-size:.9em;font-weight:700;color:var(--purple);flex:1}
.cp-top .ai-badge{font-size:.65em;background:linear-gradient(135deg,#ff6b6b,#e74c3c);color:white;padding:3px 10px;border-radius:10px;font-weight:600}
.cp-toggle{background:none;border:1px solid var(--border);border-radius:6px;padding:4px 10px;cursor:pointer;font-size:.7em;color:var(--text3);font-family:inherit}
.msgs{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px;background:#fafafa}
.m{max-width:85%}.m.assistant{align-self:flex-start;display:flex;gap:10px;align-items:flex-start}.m.user{align-self:flex-end}
.ai-avatar{width:36px;height:36px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:1.3em;position:relative}
.ai-avatar .av-ring{position:absolute;inset:-3px;border-radius:50%;border:2px solid var(--purple);opacity:.3;animation:avRing 3s ease infinite}
@keyframes avRing{0%,100%{opacity:.3;transform:scale(1)}50%{opacity:.6;transform:scale(1.05)}}
.ai-avatar.thinking .av-ring{animation:avThink .8s ease infinite;border-color:var(--accent)}
@keyframes avThink{0%,100%{opacity:.3}50%{opacity:.8}}
.ai-avatar.celebrating{animation:avCelebrate .5s ease}
@keyframes avCelebrate{0%{transform:scale(1)}25%{transform:scale(1.2) rotate(-5deg)}50%{transform:scale(1.15) rotate(5deg)}75%{transform:scale(1.1) rotate(-3deg)}100%{transform:scale(1)}}
.m-wrap{flex:1;min-width:0}
.ai-name{font-size:.65em;color:var(--text3);font-weight:600;margin-bottom:2px;margin-left:4px}
.mb{padding:14px 18px;border-radius:20px;font-size:.84em;line-height:1.7}
.m.assistant .mb{background:white;color:var(--text);border-bottom-left-radius:6px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.m.assistant .mb h1,.m.assistant .mb h2,.m.assistant .mb h3{font-size:.92em;margin:10px 0 4px;color:var(--primary);font-weight:600}
.m.assistant .mb p{margin:4px 0}.m.assistant .mb ul,.m.assistant .mb ol{margin:4px 0 4px 18px}.m.assistant .mb li{margin:2px 0}
.m.assistant .mb strong{color:var(--purple)}.m.assistant .mb code{background:#fde8e8;padding:1px 5px;border-radius:4px;font-size:.88em}
.m.user .mb{background:var(--purple);color:white;border-bottom-right-radius:6px}
.m.assistant{position:relative}
.tts-btn{background:none;border:none;border-radius:6px;padding:2px 8px;cursor:pointer;font-size:.7em;margin-top:4px;color:var(--text3);transition:all .15s;opacity:.5}
.tts-btn:hover{opacity:1;color:var(--purple)}
.suggest-card{background:white;border:1.5px solid #f5c6c6;border-radius:16px;padding:16px;margin-top:10px;box-shadow:0 2px 8px rgba(231,76,60,.06)}
.suggest-card h5{font-size:.8em;color:var(--purple);margin-bottom:10px;font-weight:600}
.suggest-item{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid #fde8e8;font-size:.78em;gap:8px}
.suggest-item:last-child{border-bottom:none}
.suggest-item .s-name{color:var(--text);flex:1;line-height:1.4}
.suggest-item .s-meta{color:var(--text3);font-size:.88em}
.suggest-item .btn-add{background:var(--purple);color:white;border:none;padding:4px 12px;border-radius:6px;cursor:pointer;font-size:.82em;white-space:nowrap;font-family:inherit;font-weight:500}
.suggest-item .btn-add.added{background:var(--green)}
.ci-row{padding:10px 16px;border-top:1px solid var(--border);display:flex;gap:8px;align-items:center;background:white}
.ci-q{font-size:.7em;background:#fff5f5;color:var(--purple);padding:6px 12px;border-radius:20px;cursor:pointer;white-space:nowrap;border:1.5px solid #f5c6c6;font-family:inherit;font-weight:500;transition:all .15s}
.ci-q:hover{background:#fce4e4;border-color:var(--purple);transform:translateY(-1px)}
.ci-in{flex:1;padding:12px 18px;border:1.5px solid var(--border);border-radius:24px;font-size:.84em;outline:none;background:var(--bg);font-family:inherit;transition:all .2s}
.ci-in:focus{border-color:var(--purple);background:white;box-shadow:0 0 0 3px rgba(231,76,60,.1)}
.ci-s{width:38px;height:38px;border-radius:50%;background:var(--purple);border:none;color:white;cursor:pointer;font-size:.95em;display:flex;align-items:center;justify-content:center;transition:transform .15s}
.ci-s:hover{transform:scale(1.05)}
.ci-s:disabled{background:#d5d8dc;cursor:not-allowed;transform:none}

/* TYPING INDICATOR */
.typing-dots{display:flex;gap:4px;align-items:center;padding:4px 0}
.typing-dots span{width:7px;height:7px;border-radius:50%;background:var(--text3);animation:bounce .6s infinite alternate}
.typing-dots span:nth-child(2){animation-delay:.15s}
.typing-dots span:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%{opacity:.3;transform:translateY(0)}100%{opacity:1;transform:translateY(-4px)}}

/* QUICK REPLIES */
.quick-replies{display:flex;flex-wrap:wrap;gap:8px;padding:6px 0;animation:fadeUp .3s ease}
.qr-btn{font-size:.74em;background:white;color:var(--purple);padding:8px 16px;border-radius:20px;cursor:pointer;border:1.5px solid #f5c6c6;font-family:inherit;font-weight:500;transition:all .15s;white-space:nowrap;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.qr-btn:hover{background:#fde8e8;border-color:var(--purple);transform:translateY(-2px);box-shadow:0 3px 8px rgba(231,76,60,.12)}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* CELEBRATION */
.confetti-container{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999;overflow:hidden}
.confetti{position:absolute;width:8px;height:8px;border-radius:2px;animation:confettiFall 2.5s ease-out forwards}
@keyframes confettiFall{0%{transform:translateY(-20px) rotate(0deg) scale(1);opacity:1}80%{opacity:1}100%{transform:translateY(100vh) rotate(720deg) scale(0.3);opacity:0}}

/* MILESTONE TOAST */
.milestone-toast{position:fixed;top:70px;left:50%;transform:translateX(-50%) translateY(-20px);background:linear-gradient(135deg,var(--purple),#ff6b6b);color:white;padding:14px 28px;border-radius:16px;font-size:.88em;font-weight:600;z-index:9999;box-shadow:0 8px 32px rgba(231,76,60,.3);animation:toastIn .4s ease forwards;display:flex;align-items:center;gap:10px}
.milestone-toast.out{animation:toastOut .3s ease forwards}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-20px) scale(.9)}to{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}}
@keyframes toastOut{from{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}to{opacity:0;transform:translateX(-50%) translateY(-20px) scale(.9)}}

/* MESSAGE ENTRANCE */
.m{animation:msgIn .25s ease}
@keyframes msgIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* STREAK BADGE */
.streak-badge{display:inline-flex;align-items:center;gap:4px;background:linear-gradient(135deg,#ff9a56,#ff6b6b);color:white;padding:3px 10px;border-radius:12px;font-size:.65em;font-weight:600;margin-left:8px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(255,107,107,.4)}50%{box-shadow:0 0 0 6px rgba(255,107,107,0)}}

.ld{text-align:center;padding:48px;color:var(--text3);font-size:.88em}
.todo-card{background:white;border-radius:var(--radius);padding:20px;margin-bottom:16px;border:2px dashed #f0c040}
.todo-card h3{font-size:.88em;color:#e67e22;margin-bottom:6px;font-weight:600}
.todo-card p{font-size:.8em;color:var(--text2);line-height:1.5;margin-bottom:12px}
.mode-btn{display:flex;align-items:center;gap:14px;padding:16px 18px;background:white;border:1.5px solid var(--border);border-radius:16px;cursor:pointer;text-align:left;font-family:inherit;transition:all .2s;font-size:.85em;color:var(--text)}
.mode-btn:hover{border-color:var(--purple);background:#fff5f5;box-shadow:0 4px 12px rgba(231,76,60,.12);transform:translateY(-2px)}
.mode-btn .mode-icon{font-size:1.8em;flex-shrink:0}
.mode-btn strong{color:var(--purple);display:block;margin-bottom:2px}
.mode-btn .mode-desc{font-size:.82em;color:var(--text3);line-height:1.4}

/* FAST-FORWARD */
.ff-btn{width:100%;padding:10px;background:linear-gradient(135deg,#ff9a56,#ff6b6b);border:none;border-radius:8px;cursor:pointer;font-size:.78em;color:white;font-weight:600;margin-top:8px;font-family:inherit;text-align:left;display:flex;align-items:center;gap:8px;transition:all .2s}
.ff-btn:hover{filter:brightness(1.1);transform:translateY(-1px)}

/* REVIEW SCHEDULE */
.review-btn{width:100%;padding:10px;background:linear-gradient(135deg,#00b894,#00cec9);border:none;border-radius:8px;cursor:pointer;font-size:.78em;color:white;font-weight:600;margin-top:8px;font-family:inherit;text-align:left;display:flex;align-items:center;gap:8px;transition:all .2s}
.review-btn:hover{filter:brightness(1.1);transform:translateY(-1px)}
.review-card{background:white;border-radius:var(--radius);padding:18px;margin-bottom:12px;border:1.5px solid var(--border);transition:all .2s}
.review-card:hover{border-color:var(--purple);box-shadow:0 2px 8px rgba(231,76,60,.08)}
.review-card .rv-head{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.review-card .rv-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.1em;flex-shrink:0}
.review-card .rv-title{font-size:.85em;font-weight:600;color:var(--primary)}
.review-card .rv-date{font-size:.72em;color:var(--text3)}
.review-card .rv-desc{font-size:.78em;color:var(--text2);line-height:1.5;margin-bottom:10px}
.rv-status{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:8px;font-size:.7em;font-weight:600}
.rv-pending{background:#fff3e0;color:#f39c12}
.rv-ready{background:#e8f8f0;color:var(--green)}
.rv-done{background:#fde8e8;color:var(--purple)}
.rv-timeline{position:relative;padding-left:24px}
.rv-timeline::before{content:'';position:absolute;left:10px;top:0;bottom:0;width:2px;background:var(--border)}
.rv-dot{position:absolute;left:5px;width:12px;height:12px;border-radius:50%;border:2px solid var(--border);background:white;z-index:1}
.rv-dot.active{border-color:var(--green);background:var(--green)}
.rv-dot.done{border-color:var(--purple);background:var(--purple)}

/* CHAT THEME CUSTOMIZATION */
.theme-panel{position:absolute;top:44px;right:10px;background:white;border-radius:14px;box-shadow:0 8px 32px rgba(0,0,0,.15);padding:16px;z-index:100;width:240px;animation:fadeUp .2s ease;display:none}
.theme-panel.show{display:block}
.theme-panel h4{font-size:.8em;font-weight:600;color:var(--primary);margin-bottom:10px}
.theme-label{font-size:.7em;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin:10px 0 6px}
.theme-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.theme-swatch{width:100%;aspect-ratio:1;border-radius:10px;cursor:pointer;border:2.5px solid transparent;transition:all .15s}
.theme-swatch:hover{transform:scale(1.1)}
.theme-swatch.active{border-color:var(--purple)}
.bubble-opt{display:flex;gap:6px;margin-top:4px}
.bubble-opt button{flex:1;padding:6px;border-radius:8px;border:1.5px solid var(--border);background:white;cursor:pointer;font-size:.7em;font-family:inherit;color:var(--text2);transition:all .15s}
.bubble-opt button.active{border-color:var(--purple);background:#fff5f5;color:var(--purple)}
.font-opt{display:flex;gap:6px;margin-top:4px}
.font-opt button{flex:1;padding:6px;border-radius:8px;border:1.5px solid var(--border);background:white;cursor:pointer;font-family:inherit;color:var(--text2);transition:all .15s}
.font-opt button.active{border-color:var(--purple);background:#fff5f5;color:var(--purple)}
.msgs.bg-default{background:#fafafa}
.msgs.bg-warm{background:linear-gradient(180deg,#fdf6f0,#fef9f5)}
.msgs.bg-cool{background:linear-gradient(180deg,#f0f4fd,#f5f8ff)}
.msgs.bg-dark{background:#1a1a2e}
.msgs.bg-dark .m.assistant .mb{background:#2d2d44;color:#e0e0e0;box-shadow:none}
.msgs.bg-dark .m.assistant .mb strong{color:#ff6b6b}
.msgs.bg-dark .m.assistant .mb h1,.msgs.bg-dark .m.assistant .mb h2,.msgs.bg-dark .m.assistant .mb h3{color:#f0f0f0}
.msgs.bg-nature{background:linear-gradient(180deg,#f0faf0,#f5fdf5)}
.msgs.bg-sunset{background:linear-gradient(180deg,#fdf0f5,#fef5f0)}
.msgs.bg-ocean{background:linear-gradient(180deg,#f0f8fd,#edf5fa)}
.msgs.bg-lavender{background:linear-gradient(180deg,#f5f0fd,#f8f5ff)}
.msgs.bubble-round .m .mb{border-radius:24px}
.msgs.bubble-round .m.assistant .mb{border-bottom-left-radius:8px}
.msgs.bubble-round .m.user .mb{border-bottom-right-radius:8px}
.msgs.bubble-sharp .m .mb{border-radius:4px}
.msgs.font-sm .mb{font-size:.78em}
.msgs.font-md .mb{font-size:.84em}
.msgs.font-lg .mb{font-size:.92em}

/* AVATAR SETUP */
.av-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;display:flex;align-items:center;justify-content:center;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.av-modal{background:white;border-radius:20px;padding:32px;width:380px;max-width:90vw;box-shadow:0 16px 48px rgba(0,0,0,.15);animation:modalIn .3s ease}
@keyframes modalIn{from{opacity:0;transform:translateY(20px) scale(.95)}to{opacity:1;transform:translateY(0) scale(1)}}
.av-modal h2{font-size:1.1em;font-weight:700;color:var(--primary);text-align:center;margin-bottom:4px}
.av-modal .av-sub{font-size:.82em;color:var(--text3);text-align:center;margin-bottom:20px}
.av-picker{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:20px}
.av-pick{width:100%;aspect-ratio:1;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.8em;cursor:pointer;border:3px solid transparent;transition:all .15s;background:var(--bg)}
.av-pick:hover{transform:scale(1.1);border-color:var(--border)}
.av-pick.selected{border-color:var(--purple);background:#fff5f5;transform:scale(1.1)}
.av-name-input{width:100%;padding:12px 16px;border:1.5px solid var(--border);border-radius:12px;font-size:.9em;font-family:inherit;outline:none;text-align:center;margin-bottom:16px}
.av-name-input:focus{border-color:var(--purple)}
.av-confirm{width:100%;padding:12px;border-radius:12px;background:var(--purple);color:white;border:none;font-size:.9em;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s}
.av-confirm:hover{filter:brightness(1.1)}
.av-confirm:disabled{background:var(--border);cursor:not-allowed}

/* SKILL BADGE */
.badge-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:300;display:flex;align-items:center;justify-content:center;animation:fadeIn .3s ease}
.badge-modal{background:white;border-radius:24px;padding:40px;width:400px;max-width:90vw;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.2);animation:badgeIn .5s cubic-bezier(.34,1.56,.64,1)}
@keyframes badgeIn{from{opacity:0;transform:scale(.5) rotate(-10deg)}to{opacity:1;transform:scale(1) rotate(0deg)}}
.badge-icon{width:120px;height:120px;margin:0 auto 16px;border-radius:50%;background:linear-gradient(135deg,#ffd700,#ffaa00);display:flex;align-items:center;justify-content:center;font-size:3.5em;box-shadow:0 8px 32px rgba(255,170,0,.3);animation:badgeSpin 1s ease .3s both}
@keyframes badgeSpin{from{transform:rotateY(180deg) scale(.8)}to{transform:rotateY(0deg) scale(1)}}
.badge-title{font-size:1.3em;font-weight:700;color:var(--primary);margin-bottom:4px}
.badge-skill{font-size:.9em;color:var(--purple);font-weight:600;margin-bottom:8px}
.badge-sub{font-size:.8em;color:var(--text3);margin-bottom:24px;line-height:1.5}
.badge-actions{display:flex;flex-direction:column;gap:10px}
.badge-btn{padding:14px;border-radius:14px;font-size:.9em;font-weight:600;border:none;cursor:pointer;font-family:inherit;transition:all .15s}
.badge-btn:hover{transform:translateY(-2px)}
.badge-btn-primary{background:var(--purple);color:white}
.badge-btn-secondary{background:var(--bg);color:var(--text2);border:1.5px solid var(--border)}
.badge-btn-gold{background:linear-gradient(135deg,#ffd700,#ffaa00);color:#5a3e00}

/* Secret badge button in sidebar */
.badge-secret{width:100%;padding:12px;background:linear-gradient(135deg,#ffd700,#ffaa00);border:none;border-radius:8px;cursor:pointer;font-size:.8em;color:#5a3e00;font-weight:700;margin-top:10px;font-family:inherit;display:none;align-items:center;gap:8px;justify-content:center;animation:badgePulse 1.5s ease infinite;text-align:center}
@keyframes badgePulse{0%,100%{box-shadow:0 0 0 0 rgba(255,215,0,.4)}50%{box-shadow:0 0 0 8px rgba(255,215,0,0)}}
</style>
</head>
<body>
<nav class="nav">
  <div class="logo"><span>✦</span> SuperPath</div>
  <div class="nav-right">
    <button class="nav-btn" onclick="goHome()">← ย้อนกลับ</button>
    <button class="nav-btn active">Skills</button>
    <button class="nav-btn">บันทึก</button>
    <div class="avatar">C</div>
  </div>
</nav>
<div class="main">

<!-- CATALOG -->
<div id="cat">
  <div class="cat-top"><div><h1>เลือกทักษะที่ต้องการพัฒนา</h1><p>เลือกทักษะแล้ว AI จะพาคุณสร้างเส้นทางการเรียนรู้</p></div>
    <input class="search" id="search" placeholder="🔍 ค้นหาทักษะ..." oninput="onSearch()"></div>
  <div class="cat-info" id="cat-info"></div>
  <div class="grid" id="catalog"><div class="ld">กำลังโหลด...</div></div>
  <button class="more-btn" id="more" style="display:none" onclick="loadMore()">โหลดเพิ่ม</button>
</div>

<!-- LEARN -->
<div id="learn">
  <div class="sb"><div class="sb-top">
    <div class="label">SuperPath</div><h2 id="sb-name">-</h2>
    <div class="sb-bar"><div class="sb-bar-fill" id="sb-bar" style="width:0%"></div></div>
    <div class="sb-pct" id="sb-pct">0%</div>
    <button class="sb-btn" onclick="showOverview()">📋 ดูภาพรวมทักษะ</button>
    <button class="ff-btn" id="ff-btn" onclick="fastForward()">⏩ Fast-Forward (Demo)</button>
    <button class="review-btn" id="rv-btn" style="display:none" onclick="showReviewSchedule()">📅 ทบทวน 2-7-30</button>
    <button class="badge-secret" id="badge-btn" onclick="claimBadge()">🏆 รับ Skill Badge!</button>
    <button class="sb-back" onclick="goHome()">← ย้อนกลับ</button>
  </div><div id="sb-list"></div></div>
  <div class="ct" id="ct"></div>
  <div class="cp" id="cp">
    <div class="cp-top" style="position:relative">
      <div class="ai-avatar" id="header-avatar" style="width:30px;height:30px;font-size:1em"><div class="av-ring"></div><span id="hdr-av-emoji">🤖</span></div>
      <h3 id="hdr-coach-name">AI Coach</h3><span class="ai-badge">Sorc AI</span>
      <button class="cp-toggle" onclick="toggleThemePanel()" title="ปรับแต่งธีม">🎨</button>
      <button class="cp-toggle" id="cp-tog" onclick="toggleChat()">⬅ ขยาย</button>
      <div class="theme-panel" id="theme-panel">
        <h4>🎨 ปรับแต่งแชท</h4>
        <div class="theme-label">พื้นหลัง</div>
        <div class="theme-grid">
          <div class="theme-swatch active" style="background:#fafafa" onclick="setBg('default',this)" title="Default"></div>
          <div class="theme-swatch" style="background:linear-gradient(135deg,#fdf6f0,#fef9f5)" onclick="setBg('warm',this)" title="Warm"></div>
          <div class="theme-swatch" style="background:linear-gradient(135deg,#f0f4fd,#f5f8ff)" onclick="setBg('cool',this)" title="Cool"></div>
          <div class="theme-swatch" style="background:#1a1a2e" onclick="setBg('dark',this)" title="Dark"></div>
          <div class="theme-swatch" style="background:linear-gradient(135deg,#f0faf0,#f5fdf5)" onclick="setBg('nature',this)" title="Nature"></div>
          <div class="theme-swatch" style="background:linear-gradient(135deg,#fdf0f5,#fef5f0)" onclick="setBg('sunset',this)" title="Sunset"></div>
          <div class="theme-swatch" style="background:linear-gradient(135deg,#f0f8fd,#edf5fa)" onclick="setBg('ocean',this)" title="Ocean"></div>
          <div class="theme-swatch" style="background:linear-gradient(135deg,#f5f0fd,#f8f5ff)" onclick="setBg('lavender',this)" title="Lavender"></div>
        </div>
        <div class="theme-label">รูปแบบ Bubble</div>
        <div class="bubble-opt">
          <button class="active" onclick="setBubble('',this)">ปกติ</button>
          <button onclick="setBubble('bubble-round',this)">กลม</button>
          <button onclick="setBubble('bubble-sharp',this)">เหลี่ยม</button>
        </div>
        <div class="theme-label">ขนาดตัวอักษร</div>
        <div class="font-opt">
          <button style="font-size:.7em" onclick="setFont('font-sm',this)">เล็ก</button>
          <button class="active" style="font-size:.78em" onclick="setFont('font-md',this)">กลาง</button>
          <button style="font-size:.88em" onclick="setFont('font-lg',this)">ใหญ่</button>
        </div>
      </div>
    </div>
    <div class="msgs" id="msgs"></div>
    <div class="ci-row" id="qr-row" style="flex-wrap:wrap">
      <button class="ci-q" onclick="askAI('แนะนำเนื้อหาสำหรับทักษะนี้')">✨ แนะนำเนื้อหา</button>
      <button class="ci-q" onclick="askAI('สร้าง To-Do List 3 ข้อสำหรับฝึกทักษะนี้')">📝 สร้าง To-Do</button>
    </div>
    <div class="ci-row">
      <input class="ci-in" id="ci" placeholder="คุยกับ AI Coach ได้เลย..." onkeydown="if(event.key==='Enter')sendMsg()">
      <button class="ci-s" id="cs" onclick="sendMsg()">➤</button>
    </div>
  </div>
</div>

</div>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
const API='',UID='user-'+Math.random().toString(36).substr(2,6);
let sid=null,sd=null,courses=[],pg=1,q='',tot=0,dt=null,path=[],todos=[],chatExp=false;
let msgCount=0,lastProg=0,lastAiText='';
let coachAvatar=localStorage.getItem('coach-avatar')||'';
let coachName=localStorage.getItem('coach-name')||'';
const AVATARS=['🤖','🦊','🐱','🦉','🐼','🧙','👩‍🏫','🧑‍💼','🦸','🐶'];
function md(t){try{return marked.parse(t||'');}catch(e){return t;}}
function toggleChat(){chatExp=!chatExp;const c=document.getElementById('cp'),t=document.getElementById('ct'),b=document.getElementById('cp-tog');
  if(chatExp){c.classList.add('expanded');t.style.display='none';b.textContent='➡ หด';}
  else{c.classList.remove('expanded');t.style.display='';b.textContent='⬅ ขยาย';}}
function expandChat(){if(!chatExp)toggleChat();}
function collapseChat(){if(chatExp)toggleChat();}

// CATALOG
async function loadSkills(ap=false){
  if(!ap){pg=1;document.getElementById('catalog').innerHTML='<div class="ld">กำลังโหลด...</div>';}
  const r=await fetch(`${API}/api/skills?q=${encodeURIComponent(q)}&page=${pg}&limit=20`);const d=await r.json();tot=d.total;
  document.getElementById('cat-info').textContent=`แสดง ${Math.min(pg*20,tot)} จาก ${tot} ทักษะ`;
  const h=d.skills.map(s=>`<div class="card" onclick="openSkill('${s.id}')">
    ${s.domain?`<span class="tag">${s.domain}</span>`:''}<h3>${s.name}</h3>
    <div class="desc">${s.definition}</div>
    <div class="meta"><span>📚 ${s.num_areas} ด้าน</span><span>✅ ${s.num_checklist_items} items</span></div></div>`).join('');
  if(ap)document.getElementById('catalog').innerHTML+=h;
  else document.getElementById('catalog').innerHTML=h||'<div class="ld">ไม่พบทักษะ</div>';
  document.getElementById('more').style.display=pg*20<tot?'block':'none';
}
function loadMore(){pg++;loadSkills(true);}
function onSearch(){clearTimeout(dt);dt=setTimeout(()=>{q=document.getElementById('search').value.trim();loadSkills();},300);}

// OPEN SKILL
let learningMode=null; // 'courses','scenario','todo'

async function openSkill(id){
  const r=await fetch(`${API}/api/skills/${id}`);sd=await r.json();courses=sd.courses||[];
  path=[];todos=[];learningMode=null;
  document.getElementById('cat').style.display='none';document.getElementById('learn').style.display='flex';
  document.getElementById('sb-name').textContent=sd.name;
  // Hide sidebar initially — show only content + chat (2 columns)
  document.querySelector('.sb').style.display='none';
  document.getElementById('ct').style.display='none';
  // Expand chat to fill
  const cp=document.getElementById('cp');cp.classList.add('expanded');chatExp=true;
  document.getElementById('cp-tog').textContent='➡ หด';
  buildSB();
  const cr=await fetch(`${API}/api/chat/start`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({user_id:UID,skill_id:id})});
  const cd=await cr.json();sid=cd.session_id;
  // Render greeting + learning mode picker
  renderMsgs(cd.messages);
  loadThemePrefs();
  if(!coachAvatar||!coachName){showAvatarSetup(()=>{showLearningModePicker();});}
  else{showLearningModePicker();}
  updateProg();
}

function showLearningModePicker(){
  const el=document.getElementById('msgs');
  const av=coachAvatar||'🤖',nm=coachName||'Sorc AI';
  el.innerHTML+=`<div class="m assistant"><div class="ai-avatar"><div class="av-ring"></div>${av}</div><div class="m-wrap"><div class="ai-name">${nm}</div><div class="mb">
    <p style="margin-bottom:12px"><strong>คุณชอบเรียนรู้แบบไหนครับ?</strong> เลือกรูปแบบที่เหมาะกับคุณ:</p>
  </div>
  <div style="display:flex;flex-direction:column;gap:8px;margin-top:4px">
    <button class="mode-btn" onclick="pickMode('courses')">
      <span class="mode-icon">📚</span>
      <div><strong>เรียนคอร์สก่อน</strong><div class="mode-desc">ดูเนื้อหาที่แนะนำ เรียนตามลำดับ</div></div>
    </button>
    <button class="mode-btn" onclick="pickMode('scenario')">
      <span class="mode-icon">🎯</span>
      <div><strong>สรุปสิ่งที่ควรรู้ แล้วจำลองสถานการณ์</strong><div class="mode-desc">AI สรุปให้ แล้วถามคำถามจากสถานการณ์จริง</div></div>
    </button>
    <button class="mode-btn" onclick="pickMode('todo')">
      <span class="mode-icon">🛠️</span>
      <div><strong>ลองลงมือทำจริง</strong><div class="mode-desc">AI สร้าง To-Do List ให้ทำแล้วส่งงาน</div></div>
    </button>
  </div></div></div>`;
  el.scrollTop=99999;
}

async function pickMode(mode){
  learningMode=mode;
  // Show sidebar
  document.querySelector('.sb').style.display='flex';
  document.getElementById('ct').style.display='';

  const modeLabels={courses:'📚 เรียนคอร์สก่อน',scenario:'🎯 จำลองสถานการณ์',todo:'🛠️ ลงมือทำจริง'};
  const el=document.getElementById('msgs');
  el.innerHTML+=`<div class="m user"><div class="mb">${modeLabels[mode]}</div></div>`;
  el.scrollTop=99999;

  if(mode==='courses'){
    askAI(`ฉันเลือกเรียนแบบ "เรียนคอร์สก่อน" สำหรับทักษะ ${sd.name} ช่วยแนะนำคอร์สเรียนที่เหมาะสมให้หน่อย พร้อมเหตุผลว่าทำไมถึงแนะนำ`);
  } else if(mode==='scenario'){
    askAI(`ฉันเลือกเรียนแบบ "สรุปสิ่งที่ควรรู้ แล้วจำลองสถานการณ์" สำหรับทักษะ ${sd.name} ช่วยสรุปสิ่งสำคัญที่ควรรู้ก่อน แล้วสร้างสถานการณ์จำลอง 1 ข้อให้ฉันลองตอบ`);
  } else {
    askAI(`ฉันเลือกเรียนแบบ "ลงมือทำจริง" สำหรับทักษะ ${sd.name} ช่วยสร้าง To-Do List 3-5 ข้อที่ฉันสามารถลงมือทำได้จริง แต่ละข้อระบุสิ่งที่ต้องทำชัดเจน`);
  }
}

// SIDEBAR
function buildSB(){
  let h='';const inP=path.filter(p=>p.in);
  if(inP.length){h+=`<div class="sb-sec">เนื้อหาใน SuperPath (${inP.length})</div>`;
    inP.forEach(p=>{const c=courses[p.idx];if(!c)return;
      h+=`<div class="si" id="si-c${p.idx}" onclick="collapseChat();viewCourse(${p.idx})"><div class="dot c"></div><div class="inf"><div class="tp">คอร์สออนไลน์</div><div class="nm">${c.name}</div><div class="du">${c.duration||''}</div></div></div>`;});}
  if(todos.length){h+=`<div class="sb-sec">To-Do List (${todos.length})</div>`;
    todos.forEach((t,i)=>{h+=`<div class="si" id="si-t${i}" onclick="collapseChat();viewTodo(${i})"><div class="dot t"></div><div class="inf"><div class="tp">To-Do</div><div class="nm">${t.title}</div><div class="du">${t.ok?'✅ Verified':'⏳ รอส่งงาน'}</div></div></div>`;});}
  if(!inP.length&&!todos.length){h+='<div style="padding:24px 20px;font-size:.78em;color:rgba(255,255,255,.35);text-align:center;line-height:1.6">ยังไม่มีเนื้อหาใน SuperPath<br><br>💬 คุยกับ AI Coach เพื่อให้แนะนำเนื้อหา</div>';}
  document.getElementById('sb-list').innerHTML=h;
}

// CENTER
function showOverview(){
  collapseChat();document.querySelectorAll('.si').forEach(e=>e.classList.remove('active'));
  let h=`<div class="ct-head"><div class="bc">← ${sd.domain||'Skill'} / ${sd.name}</div><h2>${sd.name}</h2>
    <div class="row">${sd.assessment_type?`<span class="pill pill-green">${sd.assessment_type}</span>`:''}
    <span class="pill pill-purple">📚 ${sd.assessment_criteria?sd.assessment_criteria.length:0} ด้าน</span>
    <button class="btn btn-primary" onclick="expandChat();document.getElementById('ci').focus()">💬 เรียนกับ AI</button>
    ${courses.length?`<button class="btn btn-blue" onclick="showExplore()">🔍 สำรวจเนื้อหา (${courses.length})</button>`:''}
    <button class="btn btn-green" onclick="assessSkill()">🎯 ประเมินทักษะ</button></div></div>
    <div class="ct-body"><div style="color:var(--text2);line-height:1.7;margin-bottom:24px">${sd.definition}</div>`;
  if(sd.assessment_criteria&&sd.assessment_criteria.length){
    sd.assessment_criteria.forEach((a,i)=>{
      h+=`<div class="cl-card"><h3><span style="color:var(--purple)">●</span> ${a.name}</h3>`;
      a.checklist_items.forEach(it=>{h+=`<div class="cl-item"><div class="cl-check">-</div><div class="cl-text">${it.description}</div></div>`;});
      h+='</div>';});}
  h+='</div>';document.getElementById('ct').innerHTML=h;
}

function showExplore(){
  let h=`<div class="ct-head"><div class="bc">← ${sd.name} / สำรวจเนื้อหา</div><h2>🔍 เนื้อหาทั้งหมด</h2>
    <div class="row"><span class="pill pill-purple">${courses.length} คอร์ส</span>
    <button class="btn btn-outline" onclick="showOverview()">← กลับ</button></div></div><div class="ct-body">
    <p style="color:var(--text3);margin-bottom:20px;font-size:.85em">เลือกเนื้อหาที่ต้องการเพิ่มเข้า SuperPath</p>`;
  courses.forEach((c,i)=>{const inP=path.find(p=>p.idx===i&&p.in);
    h+=`<div class="course-card"><div class="course-thumb">${c.provider||'📹'}</div>
      <div style="flex:1"><h4>${c.name}</h4><div class="sub">👤 ${c.instructor} ${c.duration?'· ⏱ '+c.duration:''}</div></div>
      <button id="exp-${i}" class="btn ${inP?'btn-green':'btn-blue'}" style="font-size:.72em" onclick="toggleExp(${i})">${inP?'✓ อยู่ใน Path':'+ เพิ่ม'}</button></div>`;});
  h+='</div>';document.getElementById('ct').innerHTML=h;
}
function toggleExp(i){let p=path.find(x=>x.idx===i);if(p)p.in=!p.in;else{path.push({type:'course',idx:i,name:courses[i].name,in:true});p=path.find(x=>x.idx===i);}
  const b=document.getElementById('exp-'+i);if(b){b.className='btn '+(p.in?'btn-green':'btn-blue');b.style.fontSize='.72em';b.textContent=p.in?'✓ อยู่ใน Path':'+ เพิ่ม';}buildSB();}

function viewCourse(i){document.querySelectorAll('.si').forEach(e=>e.classList.remove('active'));
  const el=document.getElementById('si-c'+i);if(el)el.classList.add('active');const c=courses[i];if(!c)return;
  const inP=path.find(p=>p.idx===i&&p.in);
  document.getElementById('ct').innerHTML=`<div class="ct-head"><div class="bc">← ${sd.name} / คอร์ส</div><h2>${c.name}</h2>
    <div class="row"><span class="pill pill-purple">คอร์สออนไลน์</span>${c.duration?`<span class="pill pill-green">⏱ ${c.duration}</span>`:''}

// TTS
let ttsUtter=null;
function speak(btn){
  if(window.speechSynthesis.speaking){window.speechSynthesis.cancel();btn.textContent='🔊';return;}
  const text=btn.closest('.m').querySelector('.mb').innerText;
  ttsUtter=new SpeechSynthesisUtterance(text);
  ttsUtter.lang='th-TH';ttsUtter.rate=1.25;ttsUtter.pitch=1.8;
  const voices=window.speechSynthesis.getVoices();
  const thVoice=voices.find(v=>v.lang.startsWith('th'));
  if(thVoice)ttsUtter.voice=thVoice;
  btn.textContent='⏹';
  ttsUtter.onend=()=>{btn.textContent='🔊';};
  window.speechSynthesis.speak(ttsUtter);
}

async function sendMsg(){const inp=document.getElementById('ci'),msg=inp.value.trim();if(!msg||!sid)return;inp.value='';document.getElementById('cs').disabled=true;
  const el=document.getElementById('msgs');el.innerHTML+=`<div class="m user"><div class="mb">${msg}</div></div>`;
  const aiId='ai-'+Date.now();el.innerHTML+=`<div class="m assistant"><div class="ai-avatar thinking"><div class="av-ring"></div>${coachAvatar||'🤖'}</div><div class="m-wrap"><div class="ai-name">${coachName||'Sorc AI'}</div><div class="mb" id="${aiId}"><div class="typing-dots"><span></span><span></span><span></span></div></div><button class="tts-btn" onclick="speak(this)">🔊</button></div></div>`;el.scrollTop=99999;
  try{const res=await fetch(`${API}/api/chat/${sid}/stream`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:msg})});
    const reader=res.body.getReader();const dec=new TextDecoder();let full='';const bub=document.getElementById(aiId);
    while(true){const{done,value}=await reader.read();if(done)break;const chunk=dec.decode(value);
      chunk.split('\n').filter(l=>l.startsWith('data: ')).forEach(line=>{try{const d=JSON.parse(line.slice(6));if(d.text){full+=d.text;bub.innerHTML=md(full);}}catch(e){}});el.scrollTop=99999;}
    // Course cards (skip during review sessions)

        ch+=`<div class="suggest-item"><span class="s-name">${c.name}</span><span class="s-meta">${c.instructor||''}</span>
          <button class="btn-add ${ip?'added':''}" onclick="addC(${i});this.textContent='✓';this.classList.add('added')">${ip?'✓':'+ เพิ่ม'}</button></div>`;});
      ch+='</div></div>';el.innerHTML+=ch;}
    // To-Do cards (skip during review sessions)
    const tl=full.split('\n').filter(l=>l.match(/^\d+[\.\)]/));
    if(!reviewData&&tl.length>=2&&(msg.toLowerCase().includes('to-do')||full.includes('To-Do'))){
      let th=`<div class="m assistant"><div class="suggest-card"><h5>📝 เลือกเพิ่ม To-Do</h5>`;
      tl.forEach(l=>{const t=l.replace(/^\d+[\.\)]\s*/,'').replace(/\*\*/g,'').trim();const s=t.substring(0,60);const ex=todos.find(x=>x.title===s);
        th+=`<div class="suggest-item"><span class="s-name">${t.substring(0,80)}</span>
          <button class="btn-add ${ex?'added':''}" onclick="addT('${s.replace(/'/g,"\\'")}','${t.replace(/'/g,"\\'")}');this.textContent='✓';this.classList.add('added')">${ex?'✓':'+ เพิ่ม'}</button></div>`;});
      th+='</div></div>';el.innerHTML+=th;}
    // Dynamic quick replies after AI response
    showInlineQuickReplies(el,full,msg);

    const avEl=document.getElementById(aiId)?.closest('.m.assistant')?.querySelector('.ai-avatar');

function launchConfetti(count=40){

  const colors=['#e74c3c','#ff6b6b','#27ae60','#f39c12','#3498db','#e84393','#00cec9','#fdcb6e'];
  for(let i=0;i<count;i++){const c=document.createElement('div');c.className='confetti';c.style.left=Math.random()*100+'%';
    c.style.background=colors[Math.floor(Math.random()*colors.length)];c.style.animationDelay=Math.random()*0.8+'s';
    c.style.animationDuration=(2+Math.random()*1.5)+'s';
    c.style.width=(6+Math.random()*6)+'px';c.style.height=(6+Math.random()*6)+'px';
    c.style.borderRadius=Math.random()>0.5?'50%':'2px';container.appendChild(c);}
  setTimeout(()=>container.remove(),4000);
}

    replies.push({text:'✅ เข้าใจแล้ว',msg:'เข้าใจแล้วครับ ไปขั้นตอนต่อไปเลย'});
    replies.push({text:'🔍 ขอตัวอย่างเพิ่ม',msg:'ช่วยยกตัวอย่างเพิ่มเติมอีกสักข้อ'});
    replies.push({text:'❓ ยังไม่เข้าใจ',msg:'ยังไม่ค่อยเข้าใจ ช่วยอธิบายแบบง่ายกว่านี้ได้ไหม'});
  }
  // When AI gives feedback/assessment
  else if(ai.includes('ดีมาก')||ai.includes('ถูกต้อง')||ai.includes('เก่ง')){
    replies.push({text:'🎯 ท้าทายกว่านี้',msg:'ขอโจทย์ที่ยากขึ้นหน่อยได้ไหม?'});
    replies.push({text:'➡️ ไปด้านถัดไป',msg:'พร้อมเรียนด้านถัดไปแล้วครับ'});
  }
  // Generic question detection
  else if(ai.includes('?')||ai.includes('ไหม')||ai.includes('อย่างไร')||ai.includes('คิดว่า')){
    replies.push({text:'🤔 ขอคิดก่อน...',msg:'ผมคิดว่า...'});
    replies.push({text:'💡 ขอคำใบ้',msg:'ช่วยให้คำใบ้หน่อยได้ไหม?'});
  }

  if(replies.length===0)return;
  const qr=replies.slice(0,3).map(r=>`<button class="qr-btn" onclick="this.parentElement.remove();askAI('${r.msg.replace(/'/g,"\\'")}')">${r.text}</button>`).join('');
  el.innerHTML+=`<div class="quick-replies">${qr}</div>`;
}

// --- Fast-Forward ---
async function fastForward(){
  if(!sid)return;
  const btn=document.getElementById('ff-btn');btn.disabled=true;btn.textContent='⏳ กำลัง Fast-Forward...';
  try{
    const r=await fetch(`${API}/api/chat/${sid}/fast-forward`,{method:'POST',headers:{'Content-Type':'application/json'}});
    const d=await r.json();
    // Show the wrap-up message in chat
    const el=document.getElementById('msgs');
    el.innerHTML+=`<div class="m assistant"><div class="mb">${md(d.message.content)}</div><button class="tts-btn" onclick="speak(this)">🔊</button></div>`;
    // Show review schedule button + inline action
    el.innerHTML+=`<div class="m assistant"><div style="display:flex;flex-direction:column;gap:8px;margin-top:4px">
      <button class="mode-btn" onclick="scheduleReview()">
        <span class="mode-icon">📅</span>
        <div><strong>ตั้งเวลาทบทวน 2-7-30</strong><div class="mode-desc">ทบทวนใน Day 2, Day 7, Day 30 เพื่อจำได้ยาวนาน</div></div>
      </button>
      <button class="mode-btn" onclick="assessSkill()">
        <span class="mode-icon">🎯</span>
        <div><strong>ประเมินทักษะ</strong><div class="mode-desc">ให้ AI ประเมินผลการเรียนรู้ของคุณ</div></div>
      </button>
    </div></div>`;
    el.scrollTop=99999;
    // Update progress
    lastProg=Math.round(d.progress.percent_complete);
    document.getElementById('sb-bar').style.width=lastProg+'%';
    document.getElementById('sb-pct').textContent=`${lastProg}% (${d.progress.completed_checklist_items}/${d.progress.total_checklist_items})`;
    // Celebration
    launchConfetti(80);showMilestone('🎉 ยินดีด้วย! เรียนครบทุกด้านแล้ว!');
    // Show review button in sidebar
    document.getElementById('rv-btn').style.display='flex';
    btn.style.display='none';
    checkBadgeReady();
  }catch(e){btn.textContent='⏩ Fast-Forward (Demo)';btn.disabled=false;}
}

// --- 2-7-30 Review System ---
let reviewData=null;
async function scheduleReview(){
  if(!sd)return;
  try{
    const r=await fetch(`${API}/api/reviews/schedule`,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({user_id:UID,skill_id:sd.id,skill_name:sd.name})});
    reviewData=await r.json();
    document.getElementById('rv-btn').style.display='flex';
    showMilestone('📅 ตั้งเวลาทบทวนเรียบร้อย!');
    // Show in chat
    const el=document.getElementById('msgs');
    el.innerHTML+=`<div class="m assistant"><div class="mb">${md(
      '## 📅 ตั้งเวลาทบทวนตามหลัก 2-7-30 เรียบร้อย!\n\n'+
      'ระบบจะเตือนคุณให้ทบทวนทักษะ **'+sd.name+'** ตามกำหนด:\n\n'+
      '| ครั้งที่ | วัน | รูปแบบ |\n|---|---|---|\n'+
      '| 1 | Day 2 | Quick Recall — เขียนสิ่งที่จำได้ |\n'+
      '| 2 | Day 7 | สถานการณ์จำลอง |\n'+
      '| 3 | Day 30 | ประเมินเชิงลึก |\n\n'+
      '> 💡 **ทำไมต้อง 2-7-30?** จากงานวิจัย Ebbinghaus Forgetting Curve พบว่าการทบทวนในช่วง Day 2, 7, 30 ช่วยย้ายข้อมูลจากความจำระยะสั้นไปสู่ความจำระยะยาวได้อย่างมีประสิทธิภาพ'
    )}</div><button class="tts-btn" onclick="speak(this)">🔊</button></div>`;
    el.scrollTop=99999;
    showReviewSchedule();
  }catch(e){console.error(e);}
}

function showReviewSchedule(){
  collapseChat();
  const now=new Date();
  const reviews=reviewData?.reviews||[];
  const fmtDate=(iso)=>{const d=new Date(iso);return d.toLocaleDateString('th-TH',{day:'numeric',month:'short',year:'numeric'});};
  const icons={quick_recall:'🧠',scenario:'🎯',deep_review:'📊'};
  const iconBg={quick_recall:'#fff3e0',scenario:'#e8f8f0',deep_review:'#fde8e8'};

  let h=`<div class="ct-head"><div class="bc">← ${sd.name} / ทบทวน</div><h2>📅 แผนทบทวน 2-7-30</h2>
    <div class="row"><span class="pill pill-purple">Spaced Repetition</span>
    <button class="btn btn-outline" onclick="showOverview()">← กลับ</button></div></div>
    <div class="ct-body">
    <div class="cl-card" style="border-left:4px solid var(--purple);margin-bottom:20px">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
        <span style="font-size:1.4em">🧠</span>
        <div><div style="font-size:.95em;font-weight:700;color:var(--primary)">หลักการ 2-7-30 Spaced Repetition</div>
        <div style="font-size:.78em;color:var(--text2);margin-top:2px">ทบทวนใน Day 2, 7, 30 เพื่อย้ายความรู้จากความจำระยะสั้นสู่ระยะยาว</div></div>
      </div>
      <div style="display:flex;gap:20px;margin-top:12px">
        <div style="text-align:center;flex:1"><div style="font-size:1.5em">📖</div><div style="font-size:.7em;color:var(--text3);margin-top:2px">Day 2<br>Quick Recall</div></div>
        <div style="text-align:center;flex:1"><div style="font-size:1.5em">🎯</div><div style="font-size:.7em;color:var(--text3);margin-top:2px">Day 7<br>Scenario</div></div>
        <div style="text-align:center;flex:1"><div style="font-size:1.5em">📊</div><div style="font-size:.7em;color:var(--text3);margin-top:2px">Day 30<br>Deep Review</div></div>
      </div>
    </div>`;

  if(reviews.length){
    h+='<div class="rv-timeline">';
    reviews.forEach((rv,i)=>{
      const statusCls=rv.status==='completed'?'rv-done':rv.status==='in_progress'?'rv-ready':'rv-pending';
      const statusLabel=rv.status==='completed'?'✅ เสร็จแล้ว':rv.status==='in_progress'?'🔄 กำลังทบทวน':'⏳ รอทบทวน';
      const dotCls=rv.status==='completed'?'done':rv.status==='in_progress'?'active':'';
      const canStart=rv.status==='pending'||rv.status==='in_progress';
      h+=`<div class="review-card" style="position:relative;margin-bottom:16px">
        <div class="rv-dot ${dotCls}" style="top:20px"></div>
        <div class="rv-head">
          <div class="rv-icon" style="background:${iconBg[rv.type]}">${icons[rv.type]}</div>
          <div style="flex:1"><div class="rv-title">${rv.label}</div><div class="rv-date">📅 ${fmtDate(rv.date)}</div></div>
          <span class="rv-status ${statusCls}">${statusLabel}</span>
        </div>
        <div class="rv-desc">${rv.description}</div>
        ${canStart?`<button class="btn btn-blue" style="font-size:.78em" onclick="startReview(${rv.day})">💬 เริ่มทบทวน</button>`:''}
      </div>`;
    });
    h+='</div>';
  } else {
    h+=`<div style="text-align:center;padding:32px;color:var(--text3)">
      <div style="font-size:2em;margin-bottom:8px">📅</div>
      <p>ยังไม่ได้ตั้งเวลาทบทวน</p>
      <button class="btn btn-blue" style="margin-top:12px" onclick="scheduleReview()">ตั้งเวลาทบทวน 2-7-30</button>
    </div>`;
  }
  h+='</div>';
  document.getElementById('ct').innerHTML=h;
}

async function startReview(day){
  if(!sd)return;
  expandChat();
  const el=document.getElementById('msgs');
  const typeLabels={2:'Quick Recall',7:'Scenario',30:'Deep Review'};
  try{
    const r=await fetch(`${API}/api/reviews/start`,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({user_id:UID,skill_id:sd.id,review_day:day})});
    const d=await r.json();
    sid=d.session_id;
    renderMsgs(d.messages);
    // Send the review prompt to AI
    const prompt=d.prompt_hint||`เริ่ม Review Session Day ${day} สำหรับทักษะ ${sd.name}`;
    askAI(prompt);
  }catch(e){
    el.innerHTML+=`<div class="m assistant"><div class="mb" style="color:var(--accent)">เกิดข้อผิดพลาด: ${e.message}</div></div>`;
  }
}

async function completeReview(day){
  try{
    await fetch(`${API}/api/reviews/complete`,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({user_id:UID,skill_id:sd.id,review_day:day})});
    if(reviewData?.reviews){
      const rv=reviewData.reviews.find(r=>r.day===day);
      if(rv)rv.status='completed';
    }
    showMilestone(`✅ ทบทวน Day ${day} เสร็จเรียบร้อย!`);
    launchConfetti(30);
    showReviewSchedule();
  }catch(e){console.error(e);}
}

// --- Chat Theme Customization ---
let curBg='bg-default',curBubble='',curFont='font-md';
function toggleThemePanel(){document.getElementById('theme-panel').classList.toggle('show');}
document.addEventListener('click',e=>{const p=document.getElementById('theme-panel');if(p&&p.classList.contains('show')&&!e.target.closest('.theme-panel')&&!e.target.closest('[onclick*=toggleThemePanel]'))p.classList.remove('show');});
function setBg(bg,el){const m=document.getElementById('msgs');m.classList.remove(curBg);curBg='bg-'+bg;m.classList.add(curBg);
  document.querySelectorAll('.theme-swatch').forEach(s=>s.classList.remove('active'));el.classList.add('active');
  localStorage.setItem('chat-bg',bg);}
function setBubble(b,el){const m=document.getElementById('msgs');m.classList.remove(curBubble);curBubble=b;if(b)m.classList.add(b);
  el.parentElement.querySelectorAll('button').forEach(s=>s.classList.remove('active'));el.classList.add('active');
  localStorage.setItem('chat-bubble',b);}
function setFont(f,el){const m=document.getElementById('msgs');m.classList.remove(curFont);curFont=f;m.classList.add(f);
  el.parentElement.querySelectorAll('button').forEach(s=>s.classList.remove('active'));el.classList.add('active');
  localStorage.setItem('chat-font',f);}
function loadThemePrefs(){
  const bg=localStorage.getItem('chat-bg');const bub=localStorage.getItem('chat-bubble');const fnt=localStorage.getItem('chat-font');
  if(bg){const m=document.getElementById('msgs');if(m){m.classList.remove(curBg);curBg='bg-'+bg;m.classList.add(curBg);}}
  if(bub){const m=document.getElementById('msgs');if(m){curBubble=bub;m.classList.add(bub);}}
  if(fnt){const m=document.getElementById('msgs');if(m){m.classList.remove(curFont);curFont=fnt;m.classList.add(fnt);}}
}

// --- AI Avatar Setup ---
let _avatarCallback=null;
function showAvatarSetup(cb){
  _avatarCallback=cb;
  const overlay=document.createElement('div');overlay.className='av-overlay';overlay.id='av-overlay';
  overlay.innerHTML=`<div class="av-modal">
    <h2>เลือก AI Coach ของคุณ</h2>
    <div class="av-sub">ตั้งชื่อและเลือกตัวละครที่จะเป็นโค้ชส่วนตัวของคุณ</div>
    <div class="av-picker" id="av-picker">${AVATARS.map((a,i)=>`<div class="av-pick${i===0?' selected':''}" onclick="pickAvatar('${a}',this)">${a}</div>`).join('')}</div>
    <input class="av-name-input" id="av-name-inp" placeholder="ตั้งชื่อโค้ชของคุณ เช่น น้องซอร์ค" maxlength="20" oninput="document.getElementById('av-go').disabled=!this.value.trim()">
    <button class="av-confirm" id="av-go" onclick="confirmAvatar()" disabled>เริ่มเรียนกับโค้ชของฉัน →</button>
  </div>`;
  document.body.appendChild(overlay);
  // Pre-select first avatar
  coachAvatar=AVATARS[0];
}
function pickAvatar(emoji,el){
  coachAvatar=emoji;
  document.querySelectorAll('.av-pick').forEach(e=>e.classList.remove('selected'));
  el.classList.add('selected');
}
function confirmAvatar(){
  coachName=document.getElementById('av-name-inp').value.trim()||'Sorc AI';
  localStorage.setItem('coach-avatar',coachAvatar);
  localStorage.setItem('coach-name',coachName);
  updateCoachHeader();
  // Remove overlay with animation
  const ov=document.getElementById('av-overlay');
  ov.style.opacity='0';ov.style.transition='opacity .2s';
  setTimeout(()=>{ov.remove();if(_avatarCallback)_avatarCallback();},200);
  // Re-render messages with avatar
  const msgs=document.getElementById('msgs');
  if(msgs&&sid){/* messages already rendered, just update future ones */}
}
function updateCoachHeader(){
  const hdrEmoji=document.getElementById('hdr-av-emoji');
  const hdrName=document.getElementById('hdr-coach-name');
  if(hdrEmoji)hdrEmoji.textContent=coachAvatar||'🤖';
  if(hdrName)hdrName.textContent=coachName||'AI Coach';
}
// Init header on load
if(coachAvatar||coachName)setTimeout(updateCoachHeader,100);

// --- Skill Badge System ---
let badgeClaimed=false;
function checkBadgeReady(){
  const btn=document.getElementById('badge-btn');
  if(!btn)return;
  if(lastProg>=100&&!badgeClaimed){
    btn.style.display='flex';
  }
}
function claimBadge(){
  if(badgeClaimed||!sd)return;
  badgeClaimed=true;
  document.getElementById('badge-btn').style.display='none';
  launchConfetti(120);
  setTimeout(()=>launchConfetti(80),500);
  setTimeout(()=>launchConfetti(60),1000);

  const overlay=document.createElement('div');overlay.className='badge-overlay';overlay.id='badge-overlay';
  const nm=coachName||'Sorc AI';
  const av=coachAvatar||'🤖';
  overlay.innerHTML=`<div class="badge-modal">
    <div class="badge-icon">🏆</div>
    <div class="badge-title">ยินดีด้วย!</div>
    <div class="badge-skill">${sd.name} — Level 1 Complete</div>
    <div class="badge-sub">
      คุณผ่านทุกด้านของทักษะ <strong>${sd.name}</strong> แล้ว!<br>
      ${av} <strong>${nm}</strong> ภูมิใจในตัวคุณมาก 🎉<br><br>
      <span style="font-size:.85em;color:var(--text3)">Badge นี้จะถูกบันทึกไว้ในโปรไฟล์ของคุณ</span>
    </div>
    <div class="badge-actions">
      <button class="badge-btn badge-btn-gold" onclick="shareBadge()">📤 แชร์ความสำเร็จ</button>
      <button class="badge-btn badge-btn-primary" onclick="closeBadge();scheduleReview()">📅 ตั้งเวลาทบทวน 2-7-30</button>
      <button class="badge-btn badge-btn-secondary" onclick="closeBadge();goHome()">🚀 ไปต่อ Level 2 →</button>
    </div>
  </div>`;
  document.body.appendChild(overlay);
}
function closeBadge(){
  const ov=document.getElementById('badge-overlay');
  if(ov){ov.style.opacity='0';ov.style.transition='opacity .2s';setTimeout(()=>ov.remove(),200);}
}
function shareBadge(){
  const text=`🏆 ฉันเพิ่งผ่านทักษะ ${sd.name} Level 1 บน SuperPath! #SuperPath #SkillBased #Learning`;
  if(navigator.share){navigator.share({title:'SuperPath Badge',text}).catch(()=>{});}
  else{navigator.clipboard.writeText(text).then(()=>showMilestone('📋 คัดลอกข้อความแล้ว!')).catch(()=>{});}
}
</script>
